project_name: stackup

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: deveshpharswan
    name: stackup
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: deveshpharswan
      name: homebrew-tap
    homepage: "https://github.com/deveshpharswan/stackup"
    description: "Smart Docker Compose orchestration for development teams"
    license: "MIT"
    install: |
      bin.install "stackup"
    test: |
      system "#{bin}/stackup", "version"

scoops:
  - repository:
      owner: deveshpharswan
      name: scoop-stackup
    homepage: "https://github.com/deveshpharswan/stackup"
    description: "Smart Docker Compose orchestration for development teams"
    license: MIT
